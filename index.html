<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#000000" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Шматки" />
  <link rel="manifest" href="manifest.json" />
  <title>Шматки</title>
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #000;
      color: #fff;
      min-height: 100vh;
      padding: env(safe-area-inset-top) 16px env(safe-area-inset-bottom);
    }

    .app {
      max-width: 720px;
      margin: 0 auto;
      padding: 22px 0;
    }

    .top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }

    h1 {
      margin: 0;
      font-size: 30px;
      line-height: 1.1;
      letter-spacing: -0.5px;
    }

    .badge {
      background: #171717;
      border: 1px solid #2b2b2b;
      border-radius: 999px;
      padding: 8px 12px;
      color: #aaa;
      font-size: 13px;
      white-space: nowrap;
    }

    textarea {
      width: 100%;
      height: 42vh;
      min-height: 280px;
      background: #101010;
      color: #fff;
      border: 1px solid #2c2c2c;
      border-radius: 20px;
      padding: 16px;
      font-size: 17px;
      resize: none;
      outline: none;
      line-height: 1.42;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.02);
    }

    textarea:focus { border-color: #666; }

    .result {
      margin-top: 16px;
      background: #101010;
      border: 1px solid #2c2c2c;
      border-radius: 20px;
      padding: 22px 18px;
      text-align: center;
    }

    .label {
      color: #999;
      font-size: 15px;
      margin-bottom: 6px;
    }

    .number {
      font-size: 64px;
      font-weight: 900;
      letter-spacing: -2px;
    }

    .buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 14px;
    }

    button {
      padding: 16px;
      border: 0;
      border-radius: 16px;
      background: #1c1c1e;
      color: #fff;
      font-size: 17px;
      font-weight: 700;
    }

    button:active { transform: scale(0.98); background: #2c2c2e; }

    .small {
      margin-top: 14px;
      color: #777;
      font-size: 13px;
      text-align: center;
      line-height: 1.35;
    }
  </style>
</head>
<body>
  <main class="app">
    <div class="top">
      <h1>Шматки</h1>
      <div class="badge">рахує після “-”</div>
    </div>

    <textarea id="input" autofocus placeholder="Встав список:

Hyundai 2577MLZ - 3
Citroen 0462KFH - 1
Toyota 0751LWC - 3"></textarea>

    <section class="result">
      <div class="label">Всього штук</div>
      <div class="number" id="total">0</div>
    </section>

    <div class="buttons">
      <button id="pasteBtn">Вставити</button>
      <button id="clearBtn">Очистити</button>
    </div>

    <div class="small">
      Приклад: “Audi 2437MPS - 6”. Програма бере тільки числа після тире.
    </div>
  </main>

  <script>
    const input = document.getElementById("input");
    const totalEl = document.getElementById("total");
    const pasteBtn = document.getElementById("pasteBtn");
    const clearBtn = document.getElementById("clearBtn");

    function calculateTotal() {
      const text = input.value;
      const regex = /-\s*(\d+)/g;
      let total = 0;
      let match;

      while ((match = regex.exec(text)) !== null) {
        total += Number(match[1]);
      }

      totalEl.textContent = total;
    }

    input.addEventListener("input", calculateTotal);

    clearBtn.addEventListener("click", () => {
      input.value = "";
      calculateTotal();
      input.focus();
    });

    pasteBtn.addEventListener("click", async () => {
      try {
        const text = await navigator.clipboard.readText();
        input.value = text;
        calculateTotal();
        input.focus();
      } catch (e) {
        input.focus();
      }
    });

    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("sw.js");
      });
    }
  </script>
</body>
</html>
